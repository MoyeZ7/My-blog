<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的博客</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-shell">
    <div class="background-orb background-orb-left"></div>
    <div class="background-orb background-orb-right"></div>
    <header class="site-header">
      <a id="site-brand" class="brandmark" href="/">我的博客</a>
      <p id="site-header-note" class="header-note">以中文内容为主的全栈博客重建实验。</p>
    </header>

    <main class="layout">
      <section class="hero">
        <div class="hero-copy">
          <p id="hero-eyebrow" class="eyebrow">从参考模板到新实现</p>
          <h1 id="hero-title">把博客做成真正适合中文阅读的内容产品。</h1>
          <p id="hero-description" class="hero-text">
            这一版不再只是“能显示文章”，而是开始强调阅读节奏、中文文案、检索能力和更清晰的信息组织。
          </p>

          <form id="search-form" class="search-bar">
            <input
              id="search-input"
              class="search-input"
              type="search"
              name="q"
              placeholder="搜索文章、分类或标签"
            />
            <button class="search-button" type="submit">搜索</button>
          </form>
        </div>

        <aside class="hero-panel">
          <p id="panel-eyebrow" class="panel-label">当前阶段</p>
          <h2 id="panel-title">公开阅读端优先</h2>
          <p id="panel-description">
            首页、详情页、分类和标签浏览已经可用。下一阶段会进入后台壳子与内容管理流程。
          </p>
          <div id="stats-grid" class="stats-grid"></div>
        </aside>
      </section>

      <section class="content-grid">
        <div class="main-column">
          <div class="section-head">
            <p class="eyebrow">最新内容</p>
            <h2>文章列表</h2>
          </div>
          <div id="active-filters" class="active-filters"></div>
          <div id="feed-summary" class="feed-summary"></div>
          <div id="post-list" class="post-list"></div>
          <div id="pagination" class="pagination"></div>
        </div>

        <aside class="side-column">
          <div class="side-card">
            <p class="eyebrow">分类导航</p>
            <h2>按主题浏览</h2>
            <div id="category-list" class="category-list"></div>
          </div>

          <div class="side-card">
            <p class="eyebrow">时间归档</p>
            <h2>按月份回看</h2>
            <div id="archive-list" class="archive-list"></div>
            <a class="text-link archive-page-link" href="/archive">进入完整归档页</a>
          </div>

          <div class="side-card">
            <p class="eyebrow">标签索引</p>
            <h2>快速筛选</h2>
            <div id="tag-list" class="tag-list"></div>
          </div>

          <div class="side-card side-card-accent">
            <p id="feature-eyebrow" class="eyebrow">站点说明</p>
            <h2 id="feature-title">为什么先做前台</h2>
            <p id="feature-description">
              因为先把内容模型和阅读体验跑通，后台的新增、编辑和审核流程才不会建立在摇摆不定的概念之上。
            </p>
          </div>
        </aside>
      </section>
    </main>

    <template id="post-card-template">
      <article class="post-card">
        <img class="post-card-image" alt="" />
        <div class="post-card-body">
          <div class="post-meta">
            <span data-role="category"></span>
            <span data-role="date"></span>
            <span data-role="reading-time"></span>
          </div>
          <h3 data-role="title"></h3>
          <p data-role="excerpt"></p>
          <div data-role="tags" class="post-tags"></div>
          <a class="text-link" data-role="link">阅读全文</a>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
