<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog | Article</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-shell page-shell-detail">
    <header class="site-header">
      <a class="brandmark" href="/">MY BLOG</a>
      <a class="text-link" href="/">Back to home</a>
    </header>

    <main class="detail-layout">
      <article class="detail-card">
        <p class="eyebrow">Article</p>
        <h1 id="post-title"></h1>
        <div class="post-meta post-meta-large">
          <span id="post-category"></span>
          <span id="post-date"></span>
        </div>
        <img id="post-cover" class="detail-cover" alt="" />
        <div id="post-content" class="detail-content"></div>
      </article>

      <aside class="detail-sidebar">
        <div class="side-card">
          <p class="eyebrow">Related reading</p>
          <div id="related-posts" class="related-posts"></div>
        </div>
      </aside>
    </main>

    <script type="module" src="/post.js"></script>
  </body>
</html>
