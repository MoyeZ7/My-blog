<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-shell">
    <main class="admin-layout">
      <section id="login-view" class="panel panel-login">
        <div class="panel-copy">
          <p class="eyebrow">后台入口</p>
          <h1>登录后台管理台</h1>
          <p>
            当前阶段先交付最小可用的管理端，用来验证登录流程、摘要数据和后续内容操作入口。
          </p>
        </div>

        <form id="login-form" class="login-form">
          <label class="field">
            <span>账号</span>
            <input id="username-input" name="username" value="admin" autocomplete="username" />
          </label>

          <label class="field">
            <span>密码</span>
            <input
              id="password-input"
              name="password"
              type="password"
              value="123456"
              autocomplete="current-password"
            />
          </label>

          <button class="primary-button" type="submit">登录后台</button>
          <p id="login-message" class="form-message"></p>
        </form>
      </section>

      <section id="dashboard-view" class="dashboard is-hidden">
        <header class="dashboard-header">
          <div>
            <p class="eyebrow">控制台</p>
            <h1>内容管理概览</h1>
            <p id="session-note" class="muted-text"></p>
          </div>
          <button id="logout-button" class="secondary-button" type="button">退出登录</button>
        </header>

        <section id="stats-grid" class="stats-grid"></section>

        <section class="dashboard-grid">
          <article class="panel">
            <div class="section-head">
              <p class="eyebrow">最近文章</p>
              <h2>最新内容</h2>
            </div>
            <div id="recent-posts" class="list-block"></div>
          </article>

          <article class="panel">
            <div class="section-head">
              <p class="eyebrow">分类统计</p>
              <h2>内容结构</h2>
            </div>
            <div id="category-stats" class="list-block"></div>
          </article>

          <article class="panel panel-wide">
            <div class="section-head">
              <p class="eyebrow">标签分布</p>
              <h2>内容关键词</h2>
            </div>
            <div id="tag-list" class="tag-list"></div>
          </article>

          <article class="panel panel-wide">
            <div class="section-head section-head-split">
              <div>
                <p class="eyebrow">标签管理</p>
                <h2>统一维护标签命名</h2>
              </div>
              <p id="tag-list-summary" class="muted-text"></p>
            </div>

            <form id="tag-filter-form" class="filter-form">
              <input
                id="tag-search-input"
                class="filter-input"
                type="search"
                name="q"
                placeholder="搜索标签或相关文章标题"
              />
              <div></div>
              <button class="secondary-button" type="submit">筛选</button>
            </form>

            <div id="tag-admin-list" class="tag-admin-list"></div>

            <form id="tag-rename-form" class="tag-rename-form">
              <label class="field">
                <span>当前标签</span>
                <input id="tag-current-name-input" name="currentName" readonly placeholder="先从列表里选择一个标签" />
              </label>

              <label class="field">
                <span>新标签名称</span>
                <input id="tag-next-name-input" name="nextName" placeholder="输入新的标签名称" />
              </label>

              <div class="create-post-actions">
                <button class="primary-button" type="submit">保存标签名称</button>
                <p id="tag-message" class="form-message"></p>
              </div>
            </form>
          </article>

          <article class="panel panel-wide">
            <div class="section-head section-head-split">
              <div>
                <p class="eyebrow">分类管理</p>
                <h2>维护栏目结构与迁移</h2>
              </div>
              <p id="category-admin-summary" class="muted-text"></p>
            </div>

            <form id="category-admin-filter-form" class="filter-form">
              <input
                id="category-admin-search-input"
                class="filter-input"
                type="search"
                name="q"
                placeholder="搜索分类名或相关文章标题"
              />
              <div></div>
              <button class="secondary-button" type="submit">筛选</button>
            </form>

            <div id="category-admin-list" class="category-admin-list"></div>

            <form id="category-rename-form" class="tag-rename-form">
              <label class="field">
                <span>当前分类</span>
                <input
                  id="category-current-name-input"
                  name="currentName"
                  readonly
                  placeholder="先从列表里选择一个分类"
                />
              </label>

              <label class="field">
                <span>新分类名称</span>
                <input
                  id="category-next-name-input"
                  name="nextName"
                  placeholder="输入新的分类名称"
                />
              </label>

              <div class="create-post-actions">
                <button class="primary-button" type="submit">保存分类名称</button>
                <p id="category-message" class="form-message"></p>
              </div>
            </form>
          </article>

          <article class="panel panel-wide">
            <div class="section-head section-head-split">
              <div>
                <p id="editor-mode-label" class="eyebrow">内容创建</p>
                <h2 id="editor-title">新建文章</h2>
              </div>
              <div class="editor-head-actions">
                <p id="create-post-message" class="muted-text"></p>
                <button id="cancel-edit-button" class="secondary-button is-hidden" type="button">
                  取消编辑
                </button>
              </div>
            </div>

            <form id="create-post-form" class="create-post-form">
              <label class="field field-wide">
                <span>标题</span>
                <input id="create-title-input" name="title" placeholder="输入文章标题" />
              </label>

              <label class="field">
                <span>分类</span>
                <input id="create-category-input" name="category" placeholder="例如：设计" />
              </label>

              <label class="field">
                <span>状态</span>
                <select id="create-status-select" class="filter-select" name="status">
                  <option value="published">发布</option>
                  <option value="draft">草稿</option>
                </select>
              </label>

              <label class="field field-wide">
                <span>摘要</span>
                <textarea
                  id="create-excerpt-input"
                  name="excerpt"
                  class="field-textarea field-textarea-short"
                  placeholder="输入文章摘要"
                ></textarea>
              </label>

              <label class="field field-wide">
                <span>标签</span>
                <input
                  id="create-tags-input"
                  name="tags"
                  placeholder="多个标签用逗号分隔，例如：后台, 工作流"
                />
              </label>

              <label class="field field-wide">
                <span>封面图</span>
                <input
                  id="create-cover-input"
                  name="coverImage"
                  placeholder="可选，输入图片 URL"
                />
              </label>

              <div class="cover-manager field-wide">
                <article class="cover-preview-card">
                  <div class="section-head">
                    <p class="eyebrow">封面预览</p>
                    <h2>当前文章封面</h2>
                  </div>
                  <img id="cover-preview-image" class="cover-preview-image" alt="当前封面预览" />
                  <strong id="cover-preview-title" class="cover-preview-title">系统默认封面</strong>
                  <p id="cover-preview-note" class="muted-text">
                    未填写封面地址时，会自动使用系统默认封面。
                  </p>
                  <div class="cover-preview-actions">
                    <button id="apply-default-cover-button" class="secondary-button" type="button">
                      使用默认封面
                    </button>
                    <button id="open-cover-link-button" class="secondary-button" type="button">
                      新窗口查看
                    </button>
                  </div>
                  <form id="cover-upload-form" class="cover-upload-form">
                    <label class="field">
                      <span>本地上传图片</span>
                      <input
                        id="cover-upload-input"
                        name="coverUpload"
                        type="file"
                        accept="image/png,image/jpeg,image/webp,image/gif"
                      />
                    </label>
                    <div class="cover-preview-actions">
                      <button id="upload-cover-button" class="primary-button" type="submit">
                        上传并使用
                      </button>
                      <p id="cover-upload-message" class="form-message"></p>
                    </div>
                  </form>
                </article>

                <article class="cover-library-card">
                  <div class="section-head section-head-split">
                    <div>
                      <p class="eyebrow">封面库</p>
                      <h2>快速选择可用封面</h2>
                    </div>
                    <p id="cover-library-summary" class="muted-text"></p>
                  </div>

                  <form id="cover-filter-form" class="cover-filter-form">
                    <input
                      id="cover-search-input"
                      class="filter-input"
                      type="search"
                      name="q"
                      placeholder="搜索封面标题、说明或来源"
                    />
                    <button class="secondary-button" type="submit">筛选封面</button>
                  </form>

                  <div id="cover-library-list" class="cover-library-list"></div>
                </article>
              </div>

              <label class="field field-wide">
                <span>正文</span>
                <textarea
                  id="create-content-input"
                  name="content"
                  class="field-textarea"
                  placeholder="每个自然段换行即可"
                ></textarea>
              </label>

              <div class="create-post-actions">
                <button class="primary-button" type="submit">保存文章</button>
              </div>
            </form>
          </article>

          <article class="panel panel-wide">
            <div class="section-head section-head-split">
              <div>
                <p class="eyebrow">文章管理</p>
                <h2>文章列表</h2>
              </div>
              <p id="post-list-summary" class="muted-text"></p>
            </div>

            <form id="post-filter-form" class="filter-form">
              <input
                id="post-search-input"
                class="filter-input"
                type="search"
                name="q"
                placeholder="搜索文章标题或摘要"
              />
              <select id="post-category-select" class="filter-select" name="category">
                <option value="">全部分类</option>
              </select>
              <button class="secondary-button" type="submit">筛选</button>
            </form>

            <div id="post-admin-list" class="post-admin-list"></div>
          </article>

          <article class="panel panel-wide">
            <div class="section-head section-head-split">
              <div>
                <p class="eyebrow">评论管理</p>
                <h2>评论审核</h2>
              </div>
              <p id="comment-list-summary" class="muted-text"></p>
            </div>

            <form id="comment-filter-form" class="filter-form">
              <input
                id="comment-search-input"
                class="filter-input"
                type="search"
                name="q"
                placeholder="搜索评论作者、内容或文章标题"
              />
              <select id="comment-status-select" class="filter-select" name="status">
                <option value="">全部状态</option>
                <option value="pending">待审核</option>
                <option value="approved">已通过</option>
                <option value="rejected">已拒绝</option>
              </select>
              <button class="secondary-button" type="submit">筛选</button>
            </form>

            <div id="comment-admin-list" class="comment-admin-list"></div>
          </article>

          <article class="panel panel-wide">
            <div class="section-head section-head-split">
              <div>
                <p class="eyebrow">站点配置</p>
                <h2>首页与品牌文案</h2>
              </div>
              <p id="site-config-summary" class="muted-text"></p>
            </div>

            <form id="site-config-form" class="site-config-form">
              <label class="field">
                <span>站点名称</span>
                <input id="site-brand-input" name="brandName" placeholder="例如：我的博客" />
              </label>

              <label class="field">
                <span>顶部说明</span>
                <input id="site-header-note-input" name="headerNote" placeholder="例如：以中文内容为主的全栈博客重建实验。" />
              </label>

              <label class="field">
                <span>首页眉题</span>
                <input id="site-hero-eyebrow-input" name="heroEyebrow" placeholder="例如：从参考模板到新实现" />
              </label>

              <label class="field">
                <span>阶段标签</span>
                <input id="site-panel-eyebrow-input" name="panelEyebrow" placeholder="例如：当前阶段" />
              </label>

              <label class="field field-wide">
                <span>首页主标题</span>
                <input id="site-hero-title-input" name="heroTitle" placeholder="输入首页主标题" />
              </label>

              <label class="field field-wide">
                <span>首页说明</span>
                <textarea id="site-hero-description-input" name="heroDescription" class="field-textarea field-textarea-short" placeholder="输入首页主视觉说明"></textarea>
              </label>

              <label class="field">
                <span>阶段标题</span>
                <input id="site-panel-title-input" name="panelTitle" placeholder="例如：公开阅读端优先" />
              </label>

              <label class="field field-wide">
                <span>阶段说明</span>
                <textarea id="site-panel-description-input" name="panelDescription" class="field-textarea field-textarea-short" placeholder="输入阶段说明"></textarea>
              </label>

              <label class="field">
                <span>说明区眉题</span>
                <input id="site-feature-eyebrow-input" name="featureEyebrow" placeholder="例如：站点说明" />
              </label>

              <label class="field">
                <span>说明区标题</span>
                <input id="site-feature-title-input" name="featureTitle" placeholder="例如：为什么先做前台" />
              </label>

              <label class="field field-wide">
                <span>说明区内容</span>
                <textarea id="site-feature-description-input" name="featureDescription" class="field-textarea field-textarea-short" placeholder="输入首页说明区文案"></textarea>
              </label>

              <div class="create-post-actions">
                <button class="primary-button" type="submit">保存站点配置</button>
                <p id="site-config-message" class="form-message"></p>
              </div>
            </form>
          </article>
        </section>
      </section>
    </main>

    <template id="stat-card-template">
      <article class="stat-card">
        <span data-role="label"></span>
        <strong data-role="value"></strong>
      </article>
    </template>

    <template id="post-row-template">
      <article class="post-row">
        <div class="post-row-main">
          <strong data-role="title"></strong>
          <p data-role="excerpt" class="muted-text"></p>
        </div>
        <div class="post-row-meta">
          <span data-role="category"></span>
          <span data-role="status"></span>
          <span data-role="date"></span>
          <div class="post-row-actions">
            <button data-role="edit" class="secondary-button post-row-action" type="button">编辑</button>
            <button data-role="delete" class="secondary-button post-row-action is-danger" type="button">删除</button>
          </div>
        </div>
      </article>
    </template>

    <template id="comment-row-template">
      <article class="comment-row">
        <div class="comment-row-main">
          <div class="comment-row-head">
            <strong data-role="author"></strong>
            <span data-role="status" class="comment-status"></span>
          </div>
          <p data-role="content" class="muted-text"></p>
        </div>
        <div class="comment-row-meta">
          <span data-role="post-title"></span>
          <span data-role="date"></span>
          <div class="comment-row-actions">
            <button data-role="approve" class="secondary-button comment-action" type="button">通过</button>
            <button data-role="reject" class="secondary-button comment-action is-danger" type="button">拒绝</button>
          </div>
        </div>
      </article>
    </template>

    <template id="tag-row-template">
      <article class="tag-row">
        <div class="tag-row-main">
          <div class="tag-row-head">
            <strong data-role="name"></strong>
            <span data-role="count" class="tag-row-count"></span>
          </div>
          <p data-role="related-posts" class="muted-text"></p>
        </div>
        <div class="tag-row-actions">
          <button data-role="rename" class="secondary-button tag-action" type="button">重命名</button>
          <button data-role="delete" class="secondary-button tag-action is-danger" type="button">删除</button>
        </div>
      </article>
    </template>

    <template id="category-row-template">
      <article class="category-row">
        <div class="category-row-main">
          <div class="category-row-head">
            <strong data-role="name"></strong>
            <span data-role="count" class="tag-row-count"></span>
          </div>
          <p data-role="related-posts" class="muted-text"></p>
        </div>
        <div class="category-row-actions">
          <button data-role="rename" class="secondary-button tag-action" type="button">重命名</button>
          <button data-role="delete" class="secondary-button tag-action is-danger" type="button">删除</button>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
